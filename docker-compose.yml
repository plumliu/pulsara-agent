services:
  oxigraph:
    image: oxigraph/oxigraph:latest
    command: ["serve", "--location", "/data", "--bind", "0.0.0.0:7878"]
    ports:
      - "7878:7878"
    volumes:
      - ./.pulsara/oxigraph:/data

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pulsara
      POSTGRES_USER: pulsara_admin
      POSTGRES_PASSWORD: ${PULSARA_POSTGRES_ADMIN_PASSWORD:-pulsara_admin}
      PULSARA_RUNTIME_DB_USER: pulsara_runtime
      PULSARA_RUNTIME_DB_PASSWORD: ${PULSARA_POSTGRES_RUNTIME_PASSWORD:-pulsara_runtime}
    ports:
      - "5432:5432"
    volumes:
      - ./.pulsara/postgres:/var/lib/postgresql/data
      - ./docker/postgres-init/001-runtime-role.sh:/docker-entrypoint-initdb.d/001-runtime-role.sh:ro
